<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Page not found — Bisu Ghalan Portfolio" />
  <title>404 — Page Not Found</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22 font-family=%22sans-serif%22 font-weight=%22800%22 fill=%22%237c6aef%22>B.</text></svg>">

  <!-- Reuse the same design system -->
  <link rel="stylesheet" href="assets/css/fonts.css" />
  <style>
    @layer reset, tokens, base;
  </style>
  <link rel="stylesheet" href="assets/css/reset.css" layer="reset" />
  <link rel="stylesheet" href="assets/css/variables.css" layer="tokens" />

  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--clr-bg);
      color: var(--clr-text);
      font-family: var(--font-mono);
    }

    .error-card {
      text-align: center;
      max-width: 520px;
      padding: clamp(2rem, 5vw, 4rem);
      background: var(--clr-surface);
      border: 4px solid var(--clr-border);
      box-shadow: 12px 12px 0px var(--clr-shadow);
      transform: rotate(-1deg);
    }

    .error-code {
      font-family: var(--font-display);
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 900;
      line-height: 1;
      color: var(--clr-text);
      text-shadow: 4px 4px 0px var(--clr-accent), 8px 8px 0px var(--clr-pink);
      margin-bottom: 0.2em;
    }

    .error-msg {
      font-size: var(--text-xl);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1.5rem;
      color: var(--clr-muted);
    }

    .error-desc {
      font-size: var(--text-base);
      color: var(--clr-faint);
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .error-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5em;
      padding: 0.8em 1.8em;
      font-family: var(--font-mono);
      font-size: var(--text-base);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border: 3px solid var(--clr-border);
      color: var(--clr-text);
      background: var(--clr-green);
      box-shadow: 4px 4px 0px var(--clr-shadow);
      transition: transform 100ms, box-shadow 100ms, background 100ms;
    }

    .error-link:hover {
      background: var(--clr-accent);
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px var(--clr-shadow);
    }

    .error-link:active {
      transform: translate(4px, 4px);
      box-shadow: none;
    }

    .error-decor {
      display: inline-block;
      font-size: var(--text-sm);
      font-weight: 800;
      background: var(--clr-pink);
      color: var(--clr-text);
      padding: 0.3em 0.8em;
      border: 3px solid var(--clr-border);
      border-radius: 999px;
      box-shadow: 3px 3px 0px var(--clr-shadow);
      transform: rotate(3deg);
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <main>
    <div class="error-card">
      <span class="error-decor">ERROR</span>
      <h1 class="error-code">404</h1>
      <p class="error-msg">Page Not Found</p>
      <p class="error-desc">
        The page you're looking for doesn't exist or has been moved.
      </p>
      <a href="/" class="error-link">← Back to Home</a>
    </div>
  </main>
</body>
</html>
