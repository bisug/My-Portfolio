<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Project placeholder">
  <defs>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#000000" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#000000" stop-opacity="1"/>
      <stop offset="1"   stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Dashed frame (project boundary) -->
  <rect x="170" y="170" width="460" height="460" rx="14" fill="none"
    stroke="#000000" stroke-width="2" stroke-dasharray="2 20"/>

  <!-- Code window (static frame; only its contents animate) -->
  <g>
    <rect x="280" y="300" width="240" height="190" rx="12" fill="#FFFFFF"
      stroke="#000000" stroke-width="3"/>
    <!-- title-bar dots -->
    <circle cx="308" cy="330" r="7" fill="#FF3B30"/>
    <circle cx="332" cy="330" r="7" fill="#000000"/>
    <circle cx="356" cy="330" r="7" fill="#000000"/>
    <!-- code lines: type in (staggered), hold, then retract to retype -->
    <line x1="306" y1="368" x2="430" y2="368" stroke="#000000" stroke-width="4" stroke-linecap="round">
      <animate attributeName="x2" values="306;430;430;306" keyTimes="0;0.4;0.8;1" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="306" y1="396" x2="392" y2="396" stroke="#000000" stroke-width="4" stroke-linecap="round">
      <animate attributeName="x2" values="306;392;392;306" keyTimes="0;0.4;0.8;1" dur="4s" begin="0.3s" repeatCount="indefinite"/>
    </line>
    <line x1="306" y1="424" x2="456" y2="424" stroke="#000000" stroke-width="4" stroke-linecap="round">
      <animate attributeName="x2" values="306;456;456;306" keyTimes="0;0.4;0.8;1" dur="4s" begin="0.6s" repeatCount="indefinite"/>
    </line>
    <!-- blinking cursor -->
    <rect x="306" y="448" width="14" height="18" fill="#FF3B30">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1"
        dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Scanning highlight line sweeping the window (fades in/out, no pop) -->
  <rect id="scan-bar" x="280" y="300" width="240" height="6" fill="url(#scan)" opacity="0">
    <animate attributeName="y" values="306;478;306" dur="4s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;0.5;1" keySplines="0.2 0 0.8 1;0.2 0 0.8 1"/>
    <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.15;0.85;1"
      dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Pulsing accent dot -->
  <circle cx="400" cy="540" r="9" fill="#FF3B30">
    <animate attributeName="r" values="9;15;9" dur="2.4s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1"/>
  </circle>

  <text x="400" y="730" font-family="monospace" font-size="28" fill="#000000"
    letter-spacing="4" text-anchor="middle">PROJECT</text>

  <!-- Respect prefers-reduced-motion: stop all SMIL animation and hide the
       purely decorative orbit/scan elements, leaving the settled static scene.
       Note: this only runs when the SVG is inlined in HTML — <img src="..."> 
       contexts don't execute scripts, so animations always play there. -->
  <script><![CDATA[
    (function () {
      var reduce = window.matchMedia &&
        window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (!reduce) return;
      document.querySelectorAll('animate, animateTransform, animateMotion')
        .forEach(function (el) {
          if (el.parentNode) el.parentNode.removeChild(el);
        });
      var scanBar = document.getElementById('scan-bar');
      if (scanBar) scanBar.style.display = 'none';
    })();
  ]]></script>
</svg>