<svg width="680" height="680" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg" role="img">
<title>BG monogram logo</title>
<desc>A square logo with a red border frame, black interior, and the letters B and G as a bold monogram, B in white and G in red.</desc>
<rect x="90" y="90" width="500" height="500" rx="60" fill="#E4002B"/>
<rect x="102" y="102" width="476" height="476" rx="50" fill="#0D0D0D"/>
<text x="340" y="424" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-weight="800" font-size="230">
<tspan fill="#FFFFFF">B</tspan><tspan fill="#E4002B">G</tspan>
</text>
</svg>